spring.application.name=health-portal
spring.config.import=optional:file:./application-local.properties
server.port=${PORT:8080}
server.servlet.context-path=/api/v1
# JWT — set jwt.secret in application-local.properties (see .template)
jwt.expiration=3600000

# MySQL — set db.host/port/name and datasource credentials in application-local.properties (see .template)
spring.datasource.url=jdbc:mysql://${db.host}:${db.port}/${db.name}?createDatabaseIfNotExist=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
# Store UUIDs as CHAR(36) so data.sql string literals insert and query correctly
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# Seed data
spring.sql.init.mode=always

# Geoapify Geocoding API — get a free key at myprojects.geoapify.com
# Set geoapify.api-key in application-local.properties (see .template)

# Swagger UI — serve the agreed-upon API-First contract rather than auto-generating
springdoc.api-docs.enabled=true
springdoc.swagger-ui.url=/openapi.yaml
springdoc.swagger-ui.path=/swagger-ui.html